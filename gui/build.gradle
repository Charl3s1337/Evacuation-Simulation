plugins {
    id 'application'
    id 'org.openjfx.javafxplugin' version '0.0.14'
}

repositories {
    mavenCentral()
}
javafx {
    version = "17"
    modules = ['javafx.controls','javafx.graphics']
}

dependencies {
    implementation project(':engine')
}

application {
    mainClass = 'pl.pwr.galnal.gui.SimulationApp'
}